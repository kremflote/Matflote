name: matflote

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DinnerPlanner: Data Source=/data/dinnerplanner.db
      ImageStorage__RootPath: /data/images
    volumes:
      - matflote-data:/data
      - matflote-images:/data/images
    expose:
      - "8080"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${MATFLOTE_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  matflote-data:
    name: matflote-data
  matflote-images:
    name: matflote-images
